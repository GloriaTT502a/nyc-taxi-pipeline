# 文件路径: dbt_transform/profiles.yml

dbt_transform:
  target: dev
  outputs:
    dev:
      type: databricks
      catalog: nyc
      host: "{{ env_var('DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH') }}"
      schema: dev 
      auth_type: oauth
      profile: DEFAULT
      threads: 4

    ci_pipeline: 
      type: databricks

      host: "{{ env_var('DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH') }}"
      token: "{{ env_var('DATABRICKS_TOKEN') }}"

      catalog: nyc
      schema: dev

      threads: 4

      