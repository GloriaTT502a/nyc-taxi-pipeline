name: Silver Layer Pytest CI

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'adopt'
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install System Spatial Dependencies
      # 使用 DEBIAN_FRONTEND=noninteractive 防止安装挂起
      # 添加 ubuntugis ppa 以获得更快的二进制安装
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo add-apt-repository ppa:ubuntugis/ppa -y
        sudo apt-get update
        sudo apt-get install -y libgdal-dev libgeos-dev libproj-dev gdal-bin --no-install-recommends

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .

    - name: Run Pytest
      env:
        DATABRICKS_HOST: https://fake-host.cloud.databricks.com
        DATABRICKS_TOKEN: dapi-fake-token-123
      run: |
        python -m pytest tests/ -v -p no:cacheprovider