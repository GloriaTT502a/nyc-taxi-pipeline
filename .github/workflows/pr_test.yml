name: Silver Layer Pytest CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    - run: |
        python -m pip install --upgrade pip
        pip install pyspark==3.5.1 delta-spark==3.1.0 pytest chispa
    - run: PYTHONPATH=. PYTHONDONTWRITEBYTECODE=1 python -m pytest tests/ -v -p no:cacheprovider