name: Data Pipeline CI (PySpark & dbt)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'       # 🌟 升级至 Java 17，与高版本生态及本地环境保持字节码一致
        distribution: 'temurin'  # 现代工业级最推荐、最稳定的开源 JDK 发行版

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"   # 🌟 对齐 Python 3.11 运行时
        cache: 'pip'             # 开启 GitHub 官方构建缓存，大幅缩短后续 CI 的排队时间

    - name: Install System Spatial Dependencies
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gdal-bin \
          libgdal-dev \
          libgeos-dev \
          libproj-dev \
          --no-install-recommends

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 工业级优雅安装：只需一行！
        # 这会自动安装 pyspark, delta-spark (核心)，以及 pytest, chispa (测试包)
        # 它绝对不会碰 databricks-connect，所以连卸载的步骤都省了！
        pip install -e ".[test]" dbt-databricks sqlfluff 


    - name: Run Pytest
      env:
        # 1. 🌟 强行注入本地数据工程测试的“双重免死金牌”
        USE_LOCAL_SPARK: "true"   # 降维打击：强行让项目激活内部原生本地纯净 Spark 引擎
        USE_PANDAS_UDF: "false"   # 确定性优先：在测试容器内关闭 Pandas UDF，彻底绕开高版本 Java Unsafe 闪退死锁
        
        # 2. 🌟【本次修复核心】：注入 Mock 凭证，彻底致盲 Databricks SDK 的云端联调探测机制
        DATABRICKS_HOST: "https://local-isolated-testing.cloud.databricks.com"
        DATABRICKS_TOKEN: "dapi_mock_token_for_ci_isolation_1234567890_absolute_security"
      run: |
        # 运行全量单元测试，并关闭本地缓存提供者，确保每次 CI 运行都是绝对干净的冷启动
        python -m pytest tests/ -v -p no:cacheprovider

    # ==========================================
    # 第二防线：dbt 逻辑与集成测试
    # ==========================================
    - name: Install dbt Dependencies
      working-directory: ./dbt_transform  # 🌟 切换到你的 dbt 项目根目录
      env:
        DBT_PROFILES_DIR: .  # 告诉 dbt 在当前目录寻找 profiles.yml
      run: |
        dbt deps

    - name: Run dbt Unit Tests (Strictly Offline)
      working-directory: ./dbt_transform
      env:
        DBT_PROFILES_DIR: .
        # ⚠️ 绝对禁止在此注入真实的 DATABRICKS_HOST/TOKEN
      run: |
        # 强行指定 ci_offline 目标，加上 timeout 强制熔断机制（60秒上限）
        timeout 60s dbt test --target ci_offline --select "test_type:unit" || (echo "离线测试超时！请检查是否配置错误或存在试图联库的 Macro" && exit 1)
    

    # ==========================================
    # dbt 阶段二：增量集成测试 (Slim CI)
    # ==========================================
    # 💡 这一步用于获取主分支最近一次成功构建的状态文件（manifest.json）
    # 只有拿到这个文件，dbt 才知道哪些代码被修改了
    - name: Download dbt state from main branch
      if: github.event_name == 'pull_request'
      uses: dawidd6/action-download-artifact@v2
      # 如果找不到产物（比如第一次运行），不要报错停止流水线
      continue-on-error: true
      with:
        github_token: ${{secrets.GITHUB_TOKEN}}
        workflow: pr_test.yml # 你的 workflow 文件名
        branch: main
        name: dbt-manifest
        path: ./dbt_transform/prod-state

    - name: Run dbt Slim CI Build (Online Integration)
      working-directory: ./dbt_transform
      env:
        DBT_PROFILES_DIR: .
        # 此时才安全地注入真实的测试/生产凭证
        DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
        DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
      run: |
        # 检查是否成功下载了主分支的 state 文件
        if [ -f "./prod-state/manifest.json" ]; then
          echo "State file found. Running Slim CI..."
          # 工业级核心：只构建修改过的模型 (+下游)，执行对应测试，且复用(defer)未修改的上游物理表
          dbt build \
            --select "state:modified+" \
            --state ./prod-state \
            --defer
        else
          echo "State file not found. Running fallback (Data Tests Only)..."
          # 退化方案：如果没拿到状态文件，千万不要 build 全库，仅跑数据测试兜底
          dbt test --exclude "test_type:unit"
        fi

    # ==========================================
    # 收尾阶段：上传最新的状态文件
    # ==========================================
    # 这一步仅在推送到 main 分支时执行，保存最新的 manifest.json 供以后的 PR 对比使用
    - name: Upload dbt manifest artifact
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: dbt-manifest
        path: ./dbt_transform/target/manifest.json